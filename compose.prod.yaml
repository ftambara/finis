services:
  db:
    image: postgres:18-trixie
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-finis}
      POSTGRES_USER: ${DATABASE_USER:-finis}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql:rw

  redis:
    image: redis:8.6-trixie
    restart: always
    volumes:
      - redis_data:/data

  app:
    image: finis:${IMAGE_TAG:-latest}
    restart: always
    environment:
      DEBUG: "False"
      LOCAL_HTTPS: "True"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://${DATABASE_USER:-finis}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME:-finis}
      REDIS_URL: redis://redis:6379/1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      GROK_API_KEY: ${GROK_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  worker:
    image: finis:${IMAGE_TAG:-latest}
    restart: always
    command: celery -A finis worker -l info
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://${DATABASE_USER:-finis}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME:-finis}
      REDIS_URL: redis://redis:6379/1
      GROK_API_KEY: ${GROK_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - media_volume:/app/media

  caddy:
    image: caddy:2.11
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
      UPSTREAM_ADDR: app:8000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:
