services:
  db:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: ${ADMIN_DATABASE_NAME:-finis}
      POSTGRES_USER: ${ADMIN_DATABASE_USER:-finis}
      POSTGRES_PASSWORD: ${ADMIN_DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_DATABASE_USER:-finis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql:rw

  redis:
    image: redis:8.6-trixie
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - redis_data:/data

  app: &finis
    image: finis:${IMAGE_TAG:-latest}
    restart: always
    environment:
      ALLOWED_HOSTS: finis.ftambara.com
      DATABASE_URL: postgres://${DATABASE_USER:-finis}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME:-finis}
      ADMIN_DATABASE_URL: postgres://${ADMIN_DATABASE_USER:-finis}:${ADMIN_DATABASE_PASSWORD}@db:5432/${ADMIN_DATABASE_NAME:-finis}
      DEBUG: false
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-3-flash-preview
      LLM_MAX_TOKENS: 32768
      LOCAL_HTTPS: true
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      POSTHOG_HOST: ${POSTHOG_HOST}
      SCANNING_LLM_PROVIDER: gemini
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      SITE_DOMAIN: finis.ftambara.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  worker:
    <<: *finis
    command: celery -A finis worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - media_volume:/app/media

  caddy:
    image: caddy:2.11
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
      UPSTREAM_ADDR: app:8000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:
