name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Get Server IP
        id: get_ip
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          IP=$(curl -sf -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?label_selector=project%3Dfinis" \
            | jq -r '.servers[0].public_net.ipv4.ip')
          if [ -z "$IP" ] || [ "$IP" = "null" ]; then
            echo "Error: No server found with label project=finis"
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ steps.get_ip.outputs.ip }}
        run: ./scripts/setup-ssh.sh

      - name: Build Image
        run: ./scripts/build-image.sh ${{ github.sha }}

      - name: Upload Image Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: finis-image-${{ github.sha }}
          path: finis_${{ github.sha }}.tar.gz
          retention-days: 7

      - name: Remote Deploy
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          SERVER_IP: ${{ steps.get_ip.outputs.ip }}
        run: ./scripts/deploy-remote.sh "$SERVER_IP" ${{ github.sha }}
