name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    env:
      SECRET_KEY: "ci-secret-key"
      DATABASE_URL: "postgres://finis:secret@localhost:5432/finis"
      REDIS_URL: "redis://localhost:6379/1"
      GROK_API_KEY: "dummy-key"

    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_DB: finis
          POSTGRES_USER: finis
          POSTGRES_PASSWORD: secret
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-trixie
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0  # immutable
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff format
        run: uv run ruff format --check .

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest

  infra_check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Packer
        uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de # v3.2.0

      - name: Packer Init
        run: packer init packer/finis.pkr.hcl

      - name: Packer Format Check
        run: packer fmt -check packer/

      - name: Packer Validate
        run: packer validate -var hcloud_token=dummy packer/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check

      - name: Terraform Init & Validate
        run: |
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate
