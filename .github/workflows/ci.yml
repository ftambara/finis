name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_DB: finis
          POSTGRES_USER: finis
          POSTGRES_PASSWORD: secret
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-trixie
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff format
        run: uv run ruff format --check .

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy .

      - name: Run tests
        env:
          SECRET_KEY: "ci-secret-key"
          DATABASE_URL: "postgres://finis:secret@localhost:5432/finis"
          REDIS_URL: "redis://localhost:6379/1"
          GROK_API_KEY: "dummy-key"
        run: uv run pytest
