name: Migrations

on:
  push:
    branches: [ master ]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_migrations: ${{ steps.check.outputs.has_migrations }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check for migrations
        id: check
        run: |
          # Detect if any files were added or modified in migrations folders (excluding __init__.py)
          if git diff --name-only HEAD^ HEAD | grep -qE '**/migrations/.*\.py' && ! git diff --name-only HEAD^ HEAD | grep -qE '**/migrations/__init__\.py'; then
            echo "has_migrations=true" >> $GITHUB_OUTPUT
            echo "Pending migrations detected."
          else
            echo "has_migrations=false" >> $GITHUB_OUTPUT
            echo "No migrations detected."
          fi

  migrate:
    needs: detect
    if: needs.detect.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Get Server IP
        id: get_ip
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          IP=$(curl -sf -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?label_selector=project%3Dfinis" \
            | jq -r '.servers[0].public_net.ipv4.ip')
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ steps.get_ip.outputs.ip }}
        run: ./scripts/setup-ssh.sh

      - name: Build Image
        run: ./scripts/build-image.sh ${{ github.sha }}

      - name: Remote Prepare
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          SERVER_IP: ${{ steps.get_ip.outputs.ip }}
        run: ./scripts/prepare-remote.sh "$SERVER_IP" ${{ github.sha }}

      - name: Run Migrations
        env:
          SERVER_IP: ${{ steps.get_ip.outputs.ip }}
        run: ./scripts/migrate-remote.sh "$SERVER_IP" ${{ github.sha }}
