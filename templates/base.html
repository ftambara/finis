<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Finis{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c0c0c;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            background-color: #161616;
            border: 1px solid #262626;
            border-radius: 12px;
        }
        .btn-primary {
            background-color: #f5f5f5;
            color: #0c0c0c;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        /* Mobile optimization */
        @media (max-width: 640px) {
            .container-padding {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="border-b border-gray-800 sticky top-0 bg-[#0c0c0c]/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="{{ url('scanning:receipt-list') }}" class="text-xl font-bold tracking-tighter">FINIS</a>
            <div class="flex items-center space-x-6">
                {% if request.user.is_authenticated %}
                <a href="{{ url('scanning:receipt-list') }}" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">History</a>
                
                <div class="hidden sm:flex flex-col items-end">
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="text-[9px] text-gray-500 uppercase tracking-wider font-bold">Usage</span>
                        <span class="text-[10px] font-mono text-gray-300">{{ request.user.organization.get_usage_percentage() }}%</span>
                    </div>
                    <div class="w-20 h-1 bg-gray-800 rounded-full overflow-hidden">
                        {% set usage = request.user.organization.get_usage_percentage() %}
                        <div class="h-full {% if usage > 90 %}bg-red-500{% elif usage > 70 %}bg-yellow-500{% else %}bg-white{% endif %} transition-all duration-500" 
                             style="width: {{ usage }}%"></div>
                    </div>
                </div>

                <a href="{{ url('scanning:receipt-upload') }}" class="bg-white text-black px-4 py-1.5 rounded-full text-sm font-bold hover:opacity-90 transition-opacity">
                    Scan
                </a>
                <form action="{{ url('accounts:logout') }}" method="POST" class="inline">
                    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
                    <button type="submit" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">
                        Logout
                    </button>
                </form>
                {% else %}
                <a href="{{ url('accounts:login') }}" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-6 sm:py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-8 text-center text-gray-600 text-xs tracking-widest uppercase">
        &copy; 2026 Finis &mdash; Private Alpha
    </footer>
</body>
</html>
