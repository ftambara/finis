<tr id="receipt-{{ receipt.id }}" class="border-b border-gray-800 hover:bg-[#1a1a1a] transition-colors"
    {% if receipt.status in ["PENDING", "PROCESSING"] %}
    hx-get="{{ url('scanning:receipt-xhr-status', pk=receipt.id) }}"
    hx-trigger="every 5s"
    hx-swap="outerHTML"
    {% endif %}>
    <td class="p-4">
        <a href="{{ url('scanning:receipt-detail', pk=receipt.id) }}" class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <div>
                <span class="font-medium block">#{{ receipt.id }}</span>
                <span class="text-xs text-gray-500">{{ receipt.images.count() }} image(s)</span>
            </div>
        </a>
    </td>
    <td class="p-4">
        {% include "scanning/partials/status_badge.html" %}
    </td>
    <td class="p-4 text-right text-sm text-gray-500">
        {{ receipt.created_at.strftime("%b %d, %H:%M") }}
    </td>
</tr>
