{% extends "base.html" %}

{% block title %}Scan Receipt | Finis{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-10 text-center sm:text-left">
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Scan Receipt</h1>
        <p class="text-gray-500">Snap a photo or upload files to track your expenses.</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-6"
          hx-post="{{ url('scanning:receipt-upload') }}"
          hx-target="body"
          hx-indicator="#loading-indicator">
        <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
        
        <div class="card p-1 sm:p-2 border-dashed border-2 border-gray-800 bg-transparent">
            <label for="{{ form.images.id_for_label }}" class="flex flex-col items-center justify-center py-12 px-4 cursor-pointer hover:bg-white/5 transition-colors rounded-lg group">
                <div class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <span class="text-lg font-bold">Take Photo</span>
                <span class="text-sm text-gray-500 mt-1">or select from gallery</span>
                <input type="file" name="images" id="{{ form.images.id_for_label }}" multiple capture="camera" class="hidden" required onchange="updateFileList(this)">
            </label>
        </div>

        <div id="file-list" class="hidden card p-4 space-y-2">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Selected Files</h3>
            <div id="file-names" class="text-sm space-y-1"></div>
        </div>

        <button type="submit" class="btn-primary w-full py-4 text-lg">
            <span>Start Analysis</span>
            <span id="loading-indicator" class="htmx-indicator ml-3">
                <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </span>
        </button>
    </form>
</div>

<script>
function updateFileList(input) {
    const list = document.getElementById('file-list');
    const names = document.getElementById('file-names');
    names.innerHTML = '';
    
    if (input.files.length > 0) {
        list.classList.remove('hidden');
        Array.from(input.files).forEach(file => {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center text-gray-400';
            div.innerHTML = `<span>${file.name}</span><span class="text-[10px] bg-gray-800 px-1.5 py-0.5 rounded">${(file.size/1024/1024).toFixed(2)} MB</span>`;
            names.appendChild(div);
        });
    } else {
        list.classList.add('hidden');
    }
}
</script>
{% endblock %}
