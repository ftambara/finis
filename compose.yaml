services:
  db:
    image: postgres:18-trixie
    restart: always
    environment:
      POSTGRES_DB: finis
      POSTGRES_USER: finis
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql:rw

  redis:
    image: redis:8.6-trixie
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
