services:
  db:
    image: postgres:18-trixie
    restart: always
    environment:
      POSTGRES_DB: finis
      POSTGRES_USER: finis
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql:rw

  redis:
    image: redis:8.6-trixie
    restart: always
    ports:
      - "6379:6379"

  caddy:
    image: caddy:2.11
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_DOMAIN=localhost
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./static:/var/www/static
      - ./media:/var/www/media
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
